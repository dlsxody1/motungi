<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2340"/>
      <stop offset="0.42" stop-color="#7a3a55"/>
      <stop offset="0.72" stop-color="#c85f5f"/>
      <stop offset="1" stop-color="#f2a06a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1830"/>
      <stop offset="1" stop-color="#4a2c48"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#ffdca8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffdca8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1500" fill="url(#sky)"/>
  <rect width="1200" height="1500" fill="url(#glow)"/>
  <circle cx="864" cy="360" r="120" fill="#ffe6c0" opacity="0.85"/>
  <circle cx="864" cy="360" r="180" fill="#ffe6c0" opacity="0.14"/>
  <!-- skyline -->
  <g fill="#241428" opacity="0.9">
    <rect x="0" y="760" width="90" height="240"/>
    <rect x="110" y="700" width="70" height="300"/>
    <rect x="200" y="800" width="110" height="200"/>
    <rect x="330" y="660" width="64" height="340"/>
    <rect x="410" y="740" width="96" height="260"/>
    <rect x="700" y="720" width="80" height="280"/>
    <rect x="800" y="780" width="120" height="220"/>
    <rect x="940" y="700" width="70" height="300"/>
    <rect x="1030" y="770" width="100" height="230"/>
    <rect x="1150" y="740" width="60" height="260"/>
  </g>
  <!-- window lights -->
  <g fill="#ffd98a" opacity="0.8">
    <rect x="126" y="730" width="10" height="14"/><rect x="150" y="760" width="10" height="14"/>
    <rect x="346" y="700" width="9" height="12"/><rect x="368" y="740" width="9" height="12"/>
    <rect x="716" y="760" width="10" height="14"/><rect x="748" y="800" width="10" height="14"/>
    <rect x="956" y="740" width="9" height="12"/><rect x="978" y="780" width="9" height="12"/>
  </g>
  <!-- bridge -->
  <rect x="0" y="990" width="1200" height="26" fill="#1c0f22"/>
  <g stroke="#1c0f22" stroke-width="8">
    <path d="M120 990 q140 -120 280 0" fill="none"/>
    <path d="M400 990 q140 -120 280 0" fill="none"/>
    <path d="M680 990 q140 -120 280 0" fill="none"/>
    <path d="M960 990 q140 -120 280 0" fill="none"/>
  </g>
  <g fill="#ffd98a" opacity="0.85">
    <circle cx="120" cy="984" r="7"/><circle cx="400" cy="984" r="7"/>
    <circle cx="680" cy="984" r="7"/><circle cx="960" cy="984" r="7"/>
    <circle cx="1200" cy="984" r="7"/>
  </g>
  <!-- water + reflections -->
  <rect x="0" y="1016" width="1200" height="484" fill="url(#water)"/>
  <g fill="#ffd98a" opacity="0.34">
    <rect x="120" y="1040" width="6" height="200"/>
    <rect x="404" y="1040" width="6" height="240"/>
    <rect x="680" y="1040" width="6" height="180"/>
    <rect x="960" y="1040" width="6" height="220"/>
  </g>
  <g fill="#c85f5f" opacity="0.2">
    <rect x="0" y="1120" width="1200" height="8"/>
    <rect x="0" y="1220" width="1200" height="6"/>
    <rect x="0" y="1340" width="1200" height="8"/>
  </g>
</svg>
