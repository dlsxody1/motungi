      pnpm --filter @motungi/core test 61/61 통과 확인. done_when 3개 모두 충족.
      원인: HANDOFF.md §2가 stale해서 완료된 항목을 백로그에 등재했음. → HANDOFF §2 갱신 필요(후속).

