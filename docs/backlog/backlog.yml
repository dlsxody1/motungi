# 모퉁이(motungi) 야간 파이프라인 백로그 (작업 큐)
#
# 밤마다 routine이 여기서 status:todo 중 priority 최상위 1개를 집는다 (동순위면 id 오름차순).
# "제품을 발전시켜" 같은 열린 지시 금지 — 모든 야간 작업은 여기 등재된 이슈 단위로만 흐른다.
#
# 필드:
#   id         고유 ID (M-NNN). 브랜치·PR·리포트에서 이 id로 추적.
#   title      한 줄 제목
#   priority   high | medium | low  (planner가 이 순으로 집음)
#   status     todo | doing | done  (reviewer가 PR 열 때 todo→doing, 사람이 머지 후 done)
#   scope      건드릴 디렉토리 경계 (범위 밖 금지)
#   done_when  수용 기준. planner가 검증 가능한 체크리스트로 확장한다.
#   notes      배경/참고 (HANDOFF.md 근거 등)
#
# 새 이슈 추가는 사람이 이 파일에 손으로. 밤 에이전트는 status만 갱신한다.

backlog:
