    notes: >
      a11y finding 6건 통합(모두 aria 속성 추가 성격): opportunity 아이콘버튼(medium)·report 원픽
      저장버튼(high)·location 뒤로가기(medium)·검색 input 라벨(low)·Chip aria-pressed(medium)·nav
      aria-current(low). report 저장버튼 high 포함으로 우선순위 high. 순수 속성 추가라 한 밤 스윕 적합.
      [2026-07-15 완료] opportunity(뒤로/공유/저장)·location 뒤로가기·report 저장 버튼에 aria-label,
      저장 토글 전부에 aria-pressed. explore·location 검색 input 4개에 aria-label. Chip aria-pressed,
      bottom-nav·web-shell 활성 링크 aria-current="page". 테스트: bottom-nav aria-current+axe(위반 0),
      Chip aria-pressed, explore 검색 input 이름. web 103 통과, 4패키지 typecheck 클린.
