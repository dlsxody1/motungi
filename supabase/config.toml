# 모퉁이 Corner — Supabase 로컬 설정.
# `supabase start` (Docker 필요) 시 사용. 지금은 파일만 준비된 상태.
project_id = "motungi"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["motungi://", "http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

# 소셜 로그인 (기획서 §5) — 실제 키는 대시보드/환경변수로.
[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

# 카카오는 Supabase 기본 provider에 없어 커스텀 OIDC 또는 별도 연동 필요.

[storage]
enabled = true
file_size_limit = "50MiB"
